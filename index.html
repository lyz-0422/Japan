<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能記帳財務分析系統（升級美化版）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: 'Noto Sans TC', sans-serif;
  margin: 0;
  background: #eef2f7;
  color: #2c3e50;
}

header {
  margin: 20px;
  padding: 20px 30px;
  border-radius: 20px;
  background: #f8fafc;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  font-size: 22px;
  font-weight: 600;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 10px 20px;
}

.card {
  background: #f8fafc;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

input, select {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #d0d7e2;
  background: white;
}

button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: #6c7a89;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.summary-card {
  background: #ffffff;
  padding: 15px;
  border-radius: 16px;
  box-shadow: inset 0 0 0 1px #e5e9f2;
}

.summary-card h4 {
  margin: 0;
  font-size: 14px;
  color: #7b8a9a;
}

.summary-card p {
  margin: 5px 0 0;
  font-size: 20px;
  font-weight: 600;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 12px;
  text-align: left;
}

.table tr {
  border-bottom: 1px solid #e5e9f2;
}

.income { color: #2ecc71; }
.expense { color: #e74c3c; }

</style>
</head>
<body>

<header>📊 智能記帳財務分析系統</header>

<div class="container">

<div class="card">
<h3>新增記帳</h3>
<input type="date" id="date">
<input type="text" id="desc" placeholder="項目">
<input type="number" id="amount" placeholder="金額">
<select id="type">
<option value="income">收入</option>
<option value="expense">支出</option>
</select>
<button onclick="addRecord()">新增</button>
</div>

<div class="card">
<h3>財務摘要</h3>
<div class="summary">
  <div class="summary-card">
    <h4>收入</h4>
    <p id="totalIncome" class="income">0</p>
  </div>
  <div class="summary-card">
    <h4>支出</h4>
    <p id="totalExpense" class="expense">0</p>
  </div>
  <div class="summary-card">
    <h4>結餘</h4>
    <p id="balance">0</p>
  </div>
</div>
</div>

<div class="card">
<h3>記帳紀錄</h3>
<table class="table">
<thead>
<tr><th>日期</th><th>項目</th><th>類型</th><th>金額</th><th>操作</th></tr>
</thead>
<tbody id="recordTable"></tbody>
</table>
</div>

<div class="card">
<h3>財務分析</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let records = JSON.parse(localStorage.getItem('records')) || [];

function save() {
  localStorage.setItem('records', JSON.stringify(records));
}

function addRecord() {
  const date = document.getElementById('date').value;
  const desc = document.getElementById('desc').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const type = document.getElementById('type').value;

  if (!date || !desc || !amount) {
    alert('請填寫完整');
    return;
  }

  records.push({ date, desc, amount, type });
  save();
  render();
}

function deleteRecord(index) {
  records.splice(index, 1);
  save();
  render();
}

function render() {
  const table = document.getElementById('recordTable');
  table.innerHTML = '';

  let income = 0;
  let expense = 0;

  records.forEach((r, i) => {
    if (r.type === 'income') income += r.amount;
    else expense += r.amount;

    table.innerHTML += `
      <tr>
        <td>${r.date}</td>
        <td>${r.desc}</td>
        <td class="${r.type}">${r.type}</td>
        <td class="${r.type}">${r.amount}</td>
        <td><button onclick="deleteRecord(${i})">刪除</button></td>
      </tr>
    `;
  });

  document.getElementById('totalIncome').innerText = income;
  document.getElementById('totalExpense').innerText = expense;
  document.getElementById('balance').innerText = income - expense;

  drawChart(income, expense);
}

let chart;
function drawChart(income, expense) {
  const ctx = document.getElementById('chart').getContext('2d');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['收入', '支出'],
      datasets: [{
        data: [income, expense]
      }]
    }
  });
}

render();
</script>

</body>
</html>
